<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack URL Shortener</title>
    <style>
        /* ڕێکخستنی سەرەتایی و فۆنتی سیستەمی ئەپڵ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* پاشبنەمایەکی ستایلی iOS 17 */
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1d1d1f;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* کارتی سەرەکی بە ستایلی شووشەیی (Glassmorphism) */
        .ios-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        /* سەردێڕ */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #000;
        }

        p.subtitle {
            font-size: 15px;
            color: #555;
            margin-bottom: 30px;
        }

        /* بۆکسی داخڵکردنی لینک */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="url"] {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 18px;
            outline: none;
            color: #000;
            transition: all 0.2s ease;
            direction: ltr; /* لینک دەبێت لە چەپەوە بۆ ڕاست بێت */
        }

        input[type="url"]:focus {
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.2);
            border-color: #007AFF;
        }

        /* دوگمەی ئەپڵ */
        button.ios-btn {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            background-color: #007AFF; /* شینی ئەپڵ */
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        button.ios-btn:active {
            transform: scale(0.96);
        }

        button.ios-btn:hover {
            background-color: #0062cc;
        }

        /* بەشی ئەنجام (سەرەتا شاراوەیە) */
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #fff;
            border-radius: 20px;
            display: none; /* تا کلیک نەکرێت دەرناکەوێت */
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .short-url {
            font-size: 18px;
            font-weight: 600;
            color: #007AFF;
            direction: ltr;
            margin-bottom: 15px;
            word-break: break-all;
        }

        button.copy-btn {
            background-color: #f2f2f7;
            color: #007AFF;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button.copy-btn:active {
            background-color: #e5e5ea;
        }

    </style>
</head>
<body>

    <div class="ios-card">
        <h1>Jack.link</h1>
        <p class="subtitle">لینکەکانت بە خێرایی و ئاسانی کورت بکەرەوە</p>

        <div class="input-group">
            <input type="url" id="longUrl" placeholder="https://example.com/very-long-link" required>
        </div>

        <button class="ios-btn" onclick="shortenUrl()">کورتکردنەوە</button>

        <div class="result-box" id="resultBox">
            <p style="font-size: 13px; color: #888; margin-bottom: 5px;">لینکە کورتکراوەکەت:</p>
            <div class="short-url" id="shortUrlDisplay">jack.link/---</div>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">کۆپیکردنی لینک</button>
        </div>
    </div>

    <script>
        function shortenUrl() {
            const longUrlInput = document.getElementById('longUrl').value;
            const resultBox = document.getElementById('resultBox');
            const shortUrlDisplay = document.getElementById('shortUrlDisplay');
            const copyBtn = document.getElementById('copyBtn');

            // دڵنیابوونەوە لەوەی کە بۆشاییەکە بەتاڵ نییە
            if(longUrlInput.trim() === "") {
                alert("تکایە سەرەتا لینکێک بنووسە!");
                return;
            }

            // لێرەدا کۆدێکی هەڕەمەکی بۆ لینکەکە دروست دەکەین وەکو نموونە
            // (کاتێک داتابەیس بەکاردەهێنیت، ئەمە لە سێرڤەرەوە دێت)
            const randomCode = Math.random().toString(36).substring(2, 7);
            const finalShortUrl = "jack.link/" + randomCode;

            // نیشاندانی ئەنجامەکە
            shortUrlDisplay.innerText = finalShortUrl;
            resultBox.style.display = "block";
            
            // گەڕاندنەوەی دوگمەی کۆپی بۆ باری ئاسایی
            copyBtn.innerText = "کۆپیکردنی لینک";
            copyBtn.style.color = "#007AFF";
        }

        function copyToClipboard() {
            const shortUrlText = document.getElementById('shortUrlDisplay').innerText;
            const copyBtn = document.getElementById('copyBtn');

            // کۆپیکردنی تێکستەکە بۆ ناو مۆبایل یان کۆمپیوتەرەکەی بەکارهێنەر
            navigator.clipboard.writeText(shortUrlText).then(() => {
                copyBtn.innerText = "کۆپیکرا ✔";
                copyBtn.style.color = "#34c759"; // ڕەنگی سەوزی ئەپڵ
            }).catch(err => {
                console.error('کێشەیەک هەیە لە کۆپیکردندا', err);
            });
        }
    </script>

</body>
  </html>
